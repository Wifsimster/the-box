name: Publish HTML artifacts to Pages

# Publishes HTML artifacts under docs/ and tasks/ to GitHub Pages so senior
# developers can read specs, meeting records, and architecture explainers
# from a stable URL without cloning the repo. Markdown files stay in-repo.
#
# Pages serves from a separate origin (github.io) — that's intentional and
# satisfies the security policy in .claude/CLAUDE.md: HTML docs must never
# be served from the Express app on the same origin as Better Auth cookies.
#
# One-time setup (repo admin): Settings → Pages → Build & deployment → Source
# = "GitHub Actions". After that, every push to main that touches these HTML
# files redeploys the site at https://wifsimster.github.io/the-box/.

on:
  push:
    branches: [main]
    paths:
      - "docs/**/*.html"
      - "tasks/**/*.html"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build & deploy
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Assemble _site/
        # Copy HTML artifacts under docs/ and tasks/ into _site/, then
        # generate _site/index.html listing them with their <!-- SUMMARY -->
        # blocks extracted. The SUMMARY convention is enforced by
        # .claude/CLAUDE.md so the index always has meaningful entries.
        run: |
          set -euo pipefail

          mkdir -p _site/docs _site/tasks

          shopt -s nullglob
          docs_html=(docs/*.html)
          tasks_html=(tasks/*.html)
          shopt -u nullglob

          for f in "${docs_html[@]}";  do cp "$f" "_site/docs/$(basename "$f")"; done
          for f in "${tasks_html[@]}"; do cp "$f" "_site/tasks/$(basename "$f")"; done

          extract_summary() {
            # Pull the first HTML comment block, strip <!-- / -->, drop the
            # leading "SUMMARY:" tag, collapse to a single trimmed paragraph.
            awk 'BEGIN{flag=0} /<!--/{flag=1} flag{print} /-->/{if(flag){flag=0; exit}}' "$1" \
              | sed -E -e 's/<!--//' -e 's/-->//' -e 's/^[[:space:]]+//' -e 's/[[:space:]]+$//' \
              | sed -E 's/^SUMMARY:[[:space:]]*//' \
              | awk 'NF' \
              | tr '\n' ' ' \
              | sed -E 's/[[:space:]]+/ /g; s/[[:space:]]+$//'
          }

          html_escape() {
            # Minimal escape for text we inject into the index. SUMMARY blocks
            # are plain text by convention, but defend in depth.
            sed -e 's/&/\&amp;/g' -e 's/</\&lt;/g' -e 's/>/\&gt;/g' -e 's/"/\&quot;/g'
          }

          render_card() {
            local rel="$1" path="$2" badge="$3"
            local summary
            summary=$(extract_summary "$path" | html_escape)
            local rel_esc
            rel_esc=$(printf '%s' "$rel" | html_escape)
            cat <<CARD
            <a class="card" href="${rel_esc}">
              <span class="badge ${badge}">${badge}</span>
              <h2>${rel_esc}</h2>
              <p>${summary}</p>
            </a>
          CARD
          }

          {
            cat <<'HEAD'
          <!DOCTYPE html>
          <!-- SUMMARY: Index of HTML artifacts published to GitHub Pages from wifsimster/the-box. Auto-generated by .github/workflows/pages.yml. Internal — senior developers only. -->
          <html lang="en">
          <head>
          <meta charset="utf-8">
          <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
          <meta name="robots" content="noindex">
          <title>The Box — internal HTML artifacts</title>
          <style>
            :root {
              --bg: #0a0a0f; --surface: #14141c; --surface-2: #1b1b25;
              --border: rgba(255,255,255,0.08); --border-strong: rgba(255,255,255,0.16);
              --fg: #e4e4e7; --muted: #a1a1aa;
              --neon-purple: #a855f7; --neon-pink: #ec4899; --neon-blue: #38bdf8;
              --radius: 0.625rem;
              --mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
              --sans: Inter, system-ui, -apple-system, 'Segoe UI', sans-serif;
            }
            * { box-sizing: border-box; }
            html, body { margin: 0; padding: 0; }
            body { background: var(--bg); color: var(--fg); font-family: var(--sans); line-height: 1.6; -webkit-font-smoothing: antialiased; }
            a { color: var(--neon-purple); text-decoration: none; }
            a:focus-visible { outline: 2px solid var(--neon-purple); outline-offset: 2px; border-radius: 4px; }
            code { font-family: var(--mono); font-size: 0.9em; background: var(--surface-2); padding: 0.1em 0.35em; border-radius: 4px; }

            .wrap { max-width: 960px; margin: 0 auto; padding: 3rem 1.5rem 4rem; }
            header.hero {
              padding: 1.75rem 1.75rem;
              background: linear-gradient(135deg, rgba(168,85,247,0.10), rgba(56,189,248,0.05));
              border: 1px solid var(--border);
              border-radius: var(--radius);
              box-shadow: 0 0 60px -20px rgba(168,85,247,0.4);
              margin-bottom: 2rem;
            }
            header.hero h1 { margin: 0 0 0.5rem; font-size: 1.75rem; letter-spacing: -0.01em; }
            header.hero p { margin: 0.25rem 0 0; color: var(--muted); font-size: 0.95rem; }
            header.hero .scope {
              display: inline-block; margin-top: 0.75rem;
              font-family: var(--mono); font-size: 0.72rem;
              text-transform: uppercase; letter-spacing: 0.08em;
              padding: 0.25rem 0.55rem; border-radius: 999px;
              border: 1px solid var(--neon-pink); color: var(--neon-pink);
            }

            section.group { margin-top: 2rem; }
            section.group h2.group-h {
              font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.1em;
              color: var(--muted); margin: 0 0 0.75rem; font-family: var(--mono); font-weight: 500;
            }
            .grid { display: grid; gap: 0.75rem; grid-template-columns: 1fr; }
            @media (min-width: 700px) { .grid { grid-template-columns: 1fr 1fr; } }

            a.card {
              display: block; padding: 1rem 1.1rem;
              background: var(--surface); border: 1px solid var(--border);
              border-radius: var(--radius);
              color: var(--fg);
              transition: border-color .15s, transform .15s;
            }
            a.card:hover { border-color: var(--neon-purple); transform: translateY(-1px); }
            a.card h2 { margin: 0.4rem 0 0.4rem; font-family: var(--mono); font-size: 0.95rem; color: var(--neon-purple); word-break: break-all; }
            a.card p { margin: 0; color: var(--muted); font-size: 0.88rem; }
            .badge {
              display: inline-block; padding: 0.1rem 0.5rem; border-radius: 999px;
              font-size: 0.68rem; font-family: var(--mono);
              text-transform: uppercase; letter-spacing: 0.05em;
              border: 1px solid currentColor;
            }
            .badge.docs { color: var(--neon-blue); }
            .badge.tasks { color: var(--neon-pink); }
            .empty { color: var(--muted); font-style: italic; padding: 0.5rem 0; }

            footer.foot { margin-top: 3rem; padding-top: 1.25rem; border-top: 1px solid var(--border); color: var(--muted); font-size: 0.82rem; }
            footer.foot a { color: var(--muted); border-bottom: 1px dotted rgba(161,161,170,0.4); }
            footer.foot a:hover { color: var(--neon-purple); }

            @media (prefers-reduced-motion: reduce) {
              * { animation: none !important; transition: none !important; }
            }
          </style>
          </head>
          <body>
          <div class="wrap">
            <header class="hero">
              <h1>The Box — internal HTML artifacts</h1>
              <p>Specs, meeting records, and architecture explainers for the team. Markdown reference docs (<code>api.md</code>, <code>database.md</code>, <code>ui-tokens.md</code>) stay in the repo on GitHub.</p>
              <span class="scope">internal · senior developers only</span>
            </header>
          HEAD

            if [ "${#docs_html[@]}" -gt 0 ]; then
              echo "    <section class=\"group\">"
              echo "      <h2 class=\"group-h\">docs/</h2>"
              echo "      <div class=\"grid\">"
              for f in "${docs_html[@]}"; do
                render_card "docs/$(basename "$f")" "$f" "docs"
              done
              echo "      </div>"
              echo "    </section>"
            fi

            if [ "${#tasks_html[@]}" -gt 0 ]; then
              echo "    <section class=\"group\">"
              echo "      <h2 class=\"group-h\">tasks/</h2>"
              echo "      <div class=\"grid\">"
              for f in "${tasks_html[@]}"; do
                render_card "tasks/$(basename "$f")" "$f" "tasks"
              done
              echo "      </div>"
              echo "    </section>"
            fi

            if [ "${#docs_html[@]}" -eq 0 ] && [ "${#tasks_html[@]}" -eq 0 ]; then
              echo "    <p class=\"empty\">No HTML artifacts found yet.</p>"
            fi

            cat <<FOOT
              <footer class="foot">
                Generated $(date -u +'%Y-%m-%d %H:%M UTC') from <a href="https://github.com/Wifsimster/the-box">wifsimster/the-box</a> @ <code>${GITHUB_SHA::7}</code>.
                Adoption rationale: <a href="tasks/html-first-subagents-meeting.html">html-first-subagents-meeting</a>.
              </footer>
            </div>
            </body>
            </html>
          FOOT
          } > _site/index.html

          echo "Built _site/ contents:"
          find _site -type f | sort

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
