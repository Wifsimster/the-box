name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version_type:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: "patch"

permissions:
  contents: read

concurrency:
  group: release-main
  cancel-in-progress: false

env:
  DOCKER_IMAGE: wifsimster/the-box

jobs:
  decide:
    # Skip pushes made by the workflow's own `chore: bump version` commit.
    # The bump is committed with GITHUB_TOKEN which won't re-trigger workflows,
    # so this is belt-and-suspenders against a human/PAT pushing the same shape.
    if: github.event_name == 'workflow_dispatch' || github.actor != 'github-actions[bot]'
    name: Decide release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      should_release: ${{ steps.bump.outputs.should_release }}
      bump_type: ${{ steps.bump.outputs.bump_type }}
      new_version: ${{ steps.version.outputs.new_version }}
      major: ${{ steps.version.outputs.major }}
      minor: ${{ steps.version.outputs.minor }}
      short_sha: ${{ steps.version.outputs.short_sha }}
      build_date: ${{ steps.build_date.outputs.value }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Capture build timestamp
        id: build_date
        # Captured once here so both arch matrix builds stamp the same
        # value into the OCI image label, matching the manifest tag.
        run: echo "value=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Determine bump type from conventional commits
        id: bump
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual dispatch: bumping ${{ inputs.version_type }}"
            echo "bump_type=${{ inputs.version_type }}" >> "$GITHUB_OUTPUT"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          PREVIOUS_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$PREVIOUS_TAG" ]; then
            SUBJECTS=$(git log "${PREVIOUS_TAG}..HEAD" --pretty=format:"%s" --no-merges)
            BODIES=$(git log "${PREVIOUS_TAG}..HEAD" --pretty=format:"%b" --no-merges)
          else
            SUBJECTS=$(git log --pretty=format:"%s" --no-merges)
            BODIES=$(git log --pretty=format:"%b" --no-merges)
          fi

          if [ -z "$SUBJECTS" ]; then
            echo "No commits since ${PREVIOUS_TAG:-repo start} — skipping."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Commits since ${PREVIOUS_TAG:-repo start}:"
          echo "$SUBJECTS" | sed 's/^/  /'
          echo ""

          # Major: a conventional commit subject marked breaking with `!` or any
          # commit body containing the BREAKING CHANGE footer.
          if echo "$SUBJECTS" | grep -qE "^[a-z]+(\([^)]+\))?!:" \
             || echo "$BODIES" | grep -q "BREAKING CHANGE:"; then
            BUMP=major
          elif echo "$SUBJECTS" | grep -qE "^feat(\([^)]+\))?:"; then
            BUMP=minor
          elif echo "$SUBJECTS" | grep -qE "^(fix|perf|revert|refactor)(\([^)]+\))?:"; then
            BUMP=patch
          else
            echo "Only non-releasable commits (chore/docs/style/test/ci/build) — skipping."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Bump type: $BUMP"
          echo "bump_type=$BUMP" >> "$GITHUB_OUTPUT"
          echo "should_release=true" >> "$GITHUB_OUTPUT"

      - name: Compute new version
        id: version
        if: steps.bump.outputs.should_release == 'true'
        run: |
          set -euo pipefail
          CURRENT=$(node -p "require('./package.json').version")
          BUMP="${{ steps.bump.outputs.bump_type }}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          case "$BUMP" in
            patch) PATCH=$((PATCH + 1)) ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            *) echo "Unknown bump type: $BUMP" >&2; exit 1 ;;
          esac
          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "Current: $CURRENT → New: $NEW_VERSION ($BUMP)"
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "major=$MAJOR" >> "$GITHUB_OUTPUT"
          echo "minor=$MAJOR.$MINOR" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"

  checks:
    # Lint, build, test on the host. Duplicates ci.yml (which also runs on
    # push to main) but keeps release gated on a fresh pass — the two run
    # in parallel anyway so there's no wall-clock cost.
    name: Lint, Build, Test
    needs: decide
    if: needs.decide.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build all packages
        run: npm run build

      - name: Test
        run: npm test

  build:
    # Split the multi-arch Docker build across native runners — arm64 via
    # QEMU emulation on an amd64 runner is roughly 5-10x slower than native
    # and was the dominant cost of the previous single-job release. Each
    # matrix job pushes anonymously by digest; `publish` then merges them
    # into a single manifest list with the real version tags.
    #
    # Runs in parallel with `checks`; `publish` waits for both.
    name: Build ${{ matrix.platform }}
    needs: decide
    if: needs.decide.outputs.should_release == 'true'
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20
    strategy:
      fail-fast: true
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
            cache_scope: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            cache_scope: arm64
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          build-args: |
            VERSION=${{ needs.decide.outputs.new_version }}
            BUILD_DATE=${{ needs.decide.outputs.build_date }}
            VCS_REF=${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.cache_scope }}
          cache-to: type=gha,mode=max,scope=${{ matrix.cache_scope }}
          provenance: mode=max
          sbom: true
          outputs: type=image,name=${{ env.DOCKER_IMAGE }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.cache_scope }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  publish:
    # Runs only after both platform builds pushed their digests AND checks
    # passed. Merges the digests into one manifest list tagged with all the
    # version variants, then bumps workspace versions, tags the repo, and
    # publishes the GitHub release.
    name: Publish release & manifest
    needs: [decide, checks, build]
    if: needs.decide.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        run: npm ci

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          set -euo pipefail
          docker buildx imagetools create \
            --tag "${{ env.DOCKER_IMAGE }}:latest" \
            --tag "${{ env.DOCKER_IMAGE }}:v${{ needs.decide.outputs.new_version }}" \
            --tag "${{ env.DOCKER_IMAGE }}:${{ needs.decide.outputs.minor }}" \
            --tag "${{ env.DOCKER_IMAGE }}:${{ needs.decide.outputs.major }}" \
            --tag "${{ env.DOCKER_IMAGE }}:sha-${{ needs.decide.outputs.short_sha }}" \
            $(printf '${{ env.DOCKER_IMAGE }}@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect "${{ env.DOCKER_IMAGE }}:v${{ needs.decide.outputs.new_version }}"

      - name: Bump version files
        run: |
          npm run version:${{ needs.decide.outputs.bump_type }}
          echo "Bumped to $(node -p "require('./package.json').version")"

      - name: Generate changelog
        run: |
          set -euo pipefail
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$PREVIOUS_TAG" ]; then
            RANGE_ARGS=("${PREVIOUS_TAG}..HEAD")
          else
            RANGE_ARGS=()
          fi

          {
            echo "## What's Changed"
            echo ""
            git log "${RANGE_ARGS[@]}" --pretty=format:"- %s (%h)" --no-merges
            echo ""
            echo ""
            echo "### Features"
            FEATURES=$(git log "${RANGE_ARGS[@]}" --pretty=format:"%s (%h)" --no-merges \
              | grep -E "^feat(\(.+\))?:" \
              | sed -E 's/^feat(\(.+\))?:[[:space:]]*/- /' || true)
            if [ -n "$FEATURES" ]; then
              echo "$FEATURES"
            else
              echo "_No new features_"
            fi
            echo ""
            echo "### Bug Fixes"
            FIXES=$(git log "${RANGE_ARGS[@]}" --pretty=format:"%s (%h)" --no-merges \
              | grep -E "^fix(\(.+\))?:" \
              | sed -E 's/^fix(\(.+\))?:[[:space:]]*/- /' || true)
            if [ -n "$FIXES" ]; then
              echo "$FIXES"
            else
              echo "_No bug fixes_"
            fi
          } > CHANGELOG_TEMP.md

          cat CHANGELOG_TEMP.md

      - name: Commit version bump and tag
        run: |
          git add package.json packages/*/package.json package-lock.json
          git commit -m "chore: bump version to ${{ needs.decide.outputs.new_version }}"
          git tag -a "v${{ needs.decide.outputs.new_version }}" -m "Release v${{ needs.decide.outputs.new_version }}"

      - name: Push changes to repository
        # The `release-main` concurrency group with cancel-in-progress: false
        # serializes whole runs, so concurrent sibling runs cannot race here.
        # If a push ever fails, fail loudly rather than swallow it — a silent
        # exit upstream of the GitHub Release step would leave a dangling
        # Docker manifest with no matching tag or release.
        run: |
          set -euo pipefail
          git push origin HEAD:main
          git push origin "v${{ needs.decide.outputs.new_version }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.decide.outputs.new_version }}
          name: Release v${{ needs.decide.outputs.new_version }}
          body_path: CHANGELOG_TEMP.md
          draft: false
          prerelease: false

      - name: Notify release
        run: |
          echo "Released version ${{ needs.decide.outputs.new_version }}"
          echo "Docker images published:"
          echo "  - ${{ env.DOCKER_IMAGE }}:latest"
          echo "  - ${{ env.DOCKER_IMAGE }}:v${{ needs.decide.outputs.new_version }}"
          echo "  - ${{ env.DOCKER_IMAGE }}:${{ needs.decide.outputs.minor }}"
          echo "  - ${{ env.DOCKER_IMAGE }}:${{ needs.decide.outputs.major }}"
          echo "  - ${{ env.DOCKER_IMAGE }}:sha-${{ needs.decide.outputs.short_sha }}"
