name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version_type:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: "patch"

permissions:
  contents: read

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  decide:
    # Skip pushes made by the workflow's own `chore: bump version` commit.
    # The bump is committed with GITHUB_TOKEN which won't re-trigger workflows,
    # so this is belt-and-suspenders against a human/PAT pushing the same shape.
    if: github.event_name == 'workflow_dispatch' || github.actor != 'github-actions[bot]'
    name: Decide release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      should_release: ${{ steps.bump.outputs.should_release }}
      bump_type: ${{ steps.bump.outputs.bump_type }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine bump type from conventional commits
        id: bump
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual dispatch: bumping ${{ inputs.version_type }}"
            echo "bump_type=${{ inputs.version_type }}" >> "$GITHUB_OUTPUT"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          PREVIOUS_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$PREVIOUS_TAG" ]; then
            SUBJECTS=$(git log "${PREVIOUS_TAG}..HEAD" --pretty=format:"%s" --no-merges)
            BODIES=$(git log "${PREVIOUS_TAG}..HEAD" --pretty=format:"%b" --no-merges)
          else
            SUBJECTS=$(git log --pretty=format:"%s" --no-merges)
            BODIES=$(git log --pretty=format:"%b" --no-merges)
          fi

          if [ -z "$SUBJECTS" ]; then
            echo "No commits since ${PREVIOUS_TAG:-repo start} — skipping."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Commits since ${PREVIOUS_TAG:-repo start}:"
          echo "$SUBJECTS" | sed 's/^/  /'
          echo ""

          # Major: a conventional commit subject marked breaking with `!` or any
          # commit body containing the BREAKING CHANGE footer.
          if echo "$SUBJECTS" | grep -qE "^[a-z]+(\([^)]+\))?!:" \
             || echo "$BODIES" | grep -q "BREAKING CHANGE:"; then
            BUMP=major
          elif echo "$SUBJECTS" | grep -qE "^feat(\([^)]+\))?:"; then
            BUMP=minor
          elif echo "$SUBJECTS" | grep -qE "^(fix|perf|revert)(\([^)]+\))?:"; then
            BUMP=patch
          else
            echo "Only non-releasable commits (chore/docs/style/refactor/test/ci/build) — skipping."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Bump type: $BUMP"
          echo "bump_type=$BUMP" >> "$GITHUB_OUTPUT"
          echo "should_release=true" >> "$GITHUB_OUTPUT"

  release:
    name: Create Release & Publish Docker Image
    needs: decide
    if: needs.decide.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build all packages
        run: npm run build

      - name: Test
        run: npm test

      - name: Bump version
        id: version
        run: |
          npm run version:${{ needs.decide.outputs.bump_type }}
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "New version: $NEW_VERSION"

      - name: Generate changelog
        id: changelog
        run: |
          set -euo pipefail
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$PREVIOUS_TAG" ]; then
            RANGE_ARGS=("${PREVIOUS_TAG}..HEAD")
          else
            RANGE_ARGS=()
          fi

          {
            echo "## What's Changed"
            echo ""
            git log "${RANGE_ARGS[@]}" --pretty=format:"- %s (%h)" --no-merges
            echo ""
            echo ""
            echo "### Features"
            FEATURES=$(git log "${RANGE_ARGS[@]}" --pretty=format:"%s (%h)" --no-merges \
              | grep -E "^feat(\(.+\))?:" \
              | sed -E 's/^feat(\(.+\))?:[[:space:]]*/- /' || true)
            if [ -n "$FEATURES" ]; then
              echo "$FEATURES"
            else
              echo "_No new features_"
            fi
            echo ""
            echo "### Bug Fixes"
            FIXES=$(git log "${RANGE_ARGS[@]}" --pretty=format:"%s (%h)" --no-merges \
              | grep -E "^fix(\(.+\))?:" \
              | sed -E 's/^fix(\(.+\))?:[[:space:]]*/- /' || true)
            if [ -n "$FIXES" ]; then
              echo "$FIXES"
            else
              echo "_No bug fixes_"
            fi
          } > CHANGELOG_TEMP.md

          cat CHANGELOG_TEMP.md

      - name: Commit version bump
        run: |
          git add package.json packages/*/package.json package-lock.json
          git commit -m "chore: bump version to ${{ steps.version.outputs.new_version }}"
          git tag -a "v${{ steps.version.outputs.new_version }}" -m "Release v${{ steps.version.outputs.new_version }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version parts
        id: version_parts
        run: |
          VERSION="${{ steps.version.outputs.new_version }}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f1-2)
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "major=$MAJOR" >> $GITHUB_OUTPUT
          echo "minor=$MINOR" >> $GITHUB_OUTPUT
          echo "full=$VERSION" >> $GITHUB_OUTPUT
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            wifsimster/the-box:latest
            wifsimster/the-box:v${{ steps.version_parts.outputs.full }}
            wifsimster/the-box:${{ steps.version_parts.outputs.minor }}
            wifsimster/the-box:${{ steps.version_parts.outputs.major }}
            wifsimster/the-box:sha-${{ steps.version_parts.outputs.short_sha }}
          build-args: |
            VERSION=${{ steps.version.outputs.new_version }}
            BUILD_DATE=${{ github.event.repository.updated_at }}
            VCS_REF=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Push changes to repository
        run: |
          git push origin HEAD:main
          git push origin "v${{ steps.version.outputs.new_version }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.new_version }}
          name: Release v${{ steps.version.outputs.new_version }}
          body_path: CHANGELOG_TEMP.md
          draft: false
          prerelease: false

      - name: Notify release
        run: |
          echo "Released version ${{ steps.version.outputs.new_version }}"
          echo "Docker images published:"
          echo "  - wifsimster/the-box:latest"
          echo "  - wifsimster/the-box:v${{ steps.version_parts.outputs.full }}"
          echo "  - wifsimster/the-box:${{ steps.version_parts.outputs.minor }}"
          echo "  - wifsimster/the-box:${{ steps.version_parts.outputs.major }}"
          echo "  - wifsimster/the-box:sha-${{ steps.version_parts.outputs.short_sha }}"
