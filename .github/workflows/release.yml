name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version_type:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: "patch"

permissions:
  contents: read

concurrency:
  group: release-main
  cancel-in-progress: false

env:
  DOCKER_IMAGE: wifsimster/the-box

jobs:
  decide:
    # Skip pushes made by the workflow's own `chore: bump version` commit.
    # The bump is committed with GITHUB_TOKEN which won't re-trigger workflows,
    # so this is belt-and-suspenders against a human/PAT pushing the same shape.
    if: github.event_name == 'workflow_dispatch' || github.actor != 'github-actions[bot]'
    name: Decide release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      should_release: ${{ steps.bump.outputs.should_release }}
      bump_type: ${{ steps.bump.outputs.bump_type }}
      new_version: ${{ steps.version.outputs.new_version }}
      major: ${{ steps.version.outputs.major }}
      minor: ${{ steps.version.outputs.minor }}
      short_sha: ${{ steps.version.outputs.short_sha }}
      build_date: ${{ steps.build_date.outputs.value }}
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Capture build timestamp
        id: build_date
        # Captured once here so both arch matrix builds stamp the same
        # value into the OCI image label, matching the manifest tag.
        run: echo "value=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Determine bump type from conventional commits
        id: bump
        # Workflow expressions are passed through env vars so bash always
        # treats them as data, never as code to parse.
        env:
          EVENT_NAME: ${{ github.event_name }}
          VERSION_TYPE: ${{ inputs.version_type }}
        run: |
          set -euo pipefail

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "Manual dispatch: bumping $VERSION_TYPE"
            echo "bump_type=$VERSION_TYPE" >> "$GITHUB_OUTPUT"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          PREVIOUS_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$PREVIOUS_TAG" ]; then
            SUBJECTS=$(git log "${PREVIOUS_TAG}..HEAD" --pretty=format:"%s" --no-merges)
            BODIES=$(git log "${PREVIOUS_TAG}..HEAD" --pretty=format:"%b" --no-merges)
          else
            SUBJECTS=$(git log --pretty=format:"%s" --no-merges)
            BODIES=$(git log --pretty=format:"%b" --no-merges)
          fi

          if [ -z "$SUBJECTS" ]; then
            echo "No commits since ${PREVIOUS_TAG:-repo start} — skipping."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Commits since ${PREVIOUS_TAG:-repo start}:"
          echo "$SUBJECTS" | sed 's/^/  /'
          echo ""

          # Major: a conventional commit subject marked breaking with `!` or any
          # commit body containing the BREAKING CHANGE footer.
          if echo "$SUBJECTS" | grep -qE "^[a-z]+(\([^)]+\))?!:" \
             || echo "$BODIES" | grep -q "BREAKING CHANGE:"; then
            BUMP=major
          elif echo "$SUBJECTS" | grep -qE "^feat(\([^)]+\))?:"; then
            BUMP=minor
          elif echo "$SUBJECTS" | grep -qE "^(fix|perf|revert|refactor)(\([^)]+\))?:"; then
            BUMP=patch
          else
            echo "Only non-releasable commits (chore/docs/style/test/ci/build) — skipping."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Bump type: $BUMP"
          echo "bump_type=$BUMP" >> "$GITHUB_OUTPUT"
          echo "should_release=true" >> "$GITHUB_OUTPUT"

      - name: Compute new version
        id: version
        if: steps.bump.outputs.should_release == 'true'
        env:
          BUMP: ${{ steps.bump.outputs.bump_type }}
        run: |
          set -euo pipefail
          CURRENT=$(node -p "require('./package.json').version")
          # Strict semver guard: this value flows into downstream shell
          # steps, git tags and docker tags — reject anything unexpected.
          if ! [[ "$CURRENT" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version in package.json: $CURRENT" >&2
            exit 1
          fi
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          case "$BUMP" in
            patch) PATCH=$((PATCH + 1)) ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            *) echo "Unknown bump type: $BUMP" >&2; exit 1 ;;
          esac
          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "Current: $CURRENT → New: $NEW_VERSION ($BUMP)"
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "major=$MAJOR" >> "$GITHUB_OUTPUT"
          echo "minor=$MAJOR.$MINOR" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"

  checks:
    # Lint, build, test on the host. Duplicates ci.yml (which also runs on
    # push to main) but keeps release gated on a fresh pass — the two run
    # in parallel anyway so there's no wall-clock cost.
    name: Lint, Build, Test
    needs: decide
    if: needs.decide.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build all packages
        run: npm run build

      - name: Test
        run: npm test

  build:
    # Split the multi-arch Docker build across native runners — arm64 via
    # QEMU emulation on an amd64 runner is roughly 5-10x slower than native
    # and was the dominant cost of the previous single-job release. Each
    # matrix job pushes anonymously by digest; `publish` then merges them
    # into a single manifest list with the real version tags.
    #
    # Runs in parallel with `checks`; `publish` waits for both.
    name: Build ${{ matrix.platform }}
    needs: decide
    if: needs.decide.outputs.should_release == 'true'
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20
    strategy:
      fail-fast: true
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
            cache_scope: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            cache_scope: arm64
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Login to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          platforms: ${{ matrix.platform }}
          build-args: |
            VERSION=${{ needs.decide.outputs.new_version }}
            BUILD_DATE=${{ needs.decide.outputs.build_date }}
            VCS_REF=${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.cache_scope }}
          cache-to: type=gha,mode=max,scope=${{ matrix.cache_scope }}
          provenance: mode=max
          sbom: true
          outputs: type=image,name=${{ env.DOCKER_IMAGE }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          mkdir -p /tmp/digests
          touch "/tmp/digests/${DIGEST#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: digest-${{ matrix.cache_scope }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  publish:
    # Runs only after both platform builds pushed their digests AND checks
    # passed. Merges the digests into one manifest list tagged with all the
    # version variants, then bumps workspace versions, tags the repo, and
    # publishes the GitHub release.
    name: Publish release & manifest
    needs: [decide, checks, build]
    if: needs.decide.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          # Don't persist the contents:write token in .git/config — npm
          # lifecycle scripts run later in this job and must not see it.
          # The push step authenticates explicitly instead.
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24"
          cache: "npm"

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        # --ignore-scripts: nothing in this job needs dependency lifecycle
        # scripts (the version bump is plain `npm version` + file edits), and
        # skipping them keeps a compromised transitive dependency away from
        # this job's write token.
        run: npm ci --ignore-scripts

      - name: Download digests
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Login to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        env:
          NEW_VERSION: ${{ needs.decide.outputs.new_version }}
          MINOR: ${{ needs.decide.outputs.minor }}
          MAJOR: ${{ needs.decide.outputs.major }}
          SHORT_SHA: ${{ needs.decide.outputs.short_sha }}
        run: |
          set -euo pipefail
          docker buildx imagetools create \
            --tag "${DOCKER_IMAGE}:latest" \
            --tag "${DOCKER_IMAGE}:v${NEW_VERSION}" \
            --tag "${DOCKER_IMAGE}:${MINOR}" \
            --tag "${DOCKER_IMAGE}:${MAJOR}" \
            --tag "${DOCKER_IMAGE}:sha-${SHORT_SHA}" \
            $(printf "${DOCKER_IMAGE}@sha256:%s " *)

      - name: Inspect image
        env:
          NEW_VERSION: ${{ needs.decide.outputs.new_version }}
        run: |
          docker buildx imagetools inspect "${DOCKER_IMAGE}:v${NEW_VERSION}"

      - name: Bump version files
        env:
          BUMP_TYPE: ${{ needs.decide.outputs.bump_type }}
        run: |
          npm run "version:${BUMP_TYPE}"
          echo "Bumped to $(node -p "require('./package.json').version")"

      - name: Generate changelog
        run: |
          set -euo pipefail
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$PREVIOUS_TAG" ]; then
            RANGE_ARGS=("${PREVIOUS_TAG}..HEAD")
          else
            RANGE_ARGS=()
          fi

          {
            echo "## What's Changed"
            echo ""
            git log "${RANGE_ARGS[@]}" --pretty=format:"- %s (%h)" --no-merges
            echo ""
            echo ""
            echo "### Features"
            FEATURES=$(git log "${RANGE_ARGS[@]}" --pretty=format:"%s (%h)" --no-merges \
              | grep -E "^feat(\(.+\))?:" \
              | sed -E 's/^feat(\(.+\))?:[[:space:]]*/- /' || true)
            if [ -n "$FEATURES" ]; then
              echo "$FEATURES"
            else
              echo "_No new features_"
            fi
            echo ""
            echo "### Bug Fixes"
            FIXES=$(git log "${RANGE_ARGS[@]}" --pretty=format:"%s (%h)" --no-merges \
              | grep -E "^fix(\(.+\))?:" \
              | sed -E 's/^fix(\(.+\))?:[[:space:]]*/- /' || true)
            if [ -n "$FIXES" ]; then
              echo "$FIXES"
            else
              echo "_No bug fixes_"
            fi
          } > CHANGELOG_TEMP.md

          cat CHANGELOG_TEMP.md

      - name: Commit version bump and tag
        env:
          NEW_VERSION: ${{ needs.decide.outputs.new_version }}
        run: |
          git add package.json packages/*/package.json package-lock.json
          git commit -m "chore: bump version to ${NEW_VERSION}"
          git tag -a "v${NEW_VERSION}" -m "Release v${NEW_VERSION}"

      - name: Push changes to repository
        # The `release-main` concurrency group with cancel-in-progress: false
        # serializes whole runs, so concurrent sibling runs cannot race here.
        # If a push ever fails, fail loudly rather than swallow it — a silent
        # exit upstream of the GitHub Release step would leave a dangling
        # Docker manifest with no matching tag or release.
        #
        # Checkout ran with persist-credentials: false, so the token only
        # exists in this step's environment.
        env:
          NEW_VERSION: ${{ needs.decide.outputs.new_version }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          REMOTE="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push "$REMOTE" HEAD:main
          git push "$REMOTE" "v${NEW_VERSION}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          tag_name: v${{ needs.decide.outputs.new_version }}
          name: Release v${{ needs.decide.outputs.new_version }}
          body_path: CHANGELOG_TEMP.md
          draft: false
          prerelease: false

      - name: Notify release
        env:
          NEW_VERSION: ${{ needs.decide.outputs.new_version }}
          MINOR: ${{ needs.decide.outputs.minor }}
          MAJOR: ${{ needs.decide.outputs.major }}
          SHORT_SHA: ${{ needs.decide.outputs.short_sha }}
        run: |
          echo "Released version ${NEW_VERSION}"
          echo "Docker images published:"
          echo "  - ${DOCKER_IMAGE}:latest"
          echo "  - ${DOCKER_IMAGE}:v${NEW_VERSION}"
          echo "  - ${DOCKER_IMAGE}:${MINOR}"
          echo "  - ${DOCKER_IMAGE}:${MAJOR}"
          echo "  - ${DOCKER_IMAGE}:sha-${SHORT_SHA}"
