name: Deploy — homelab

# Runs on the self-hosted runner alongside the target docker host. Fires
# after the Release workflow succeeds on main, pulls `:latest`, reconciles
# the compose stack, and prunes dangling images.
# Replaces Watchtower — deploys are now observable in the Actions log.

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-homelab-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Pull & reconcile
    runs-on: [self-hosted]
    if: >-
      github.event_name == 'workflow_dispatch'
      || github.event.workflow_run.conclusion == 'success'
    defaults:
      run:
        working-directory: /opt/docker/the-box
    steps:
      # Pull only the app image. postgres and redis come from Docker Hub
      # official repos (anonymous pulls are rate-limited to 100/6h/IP);
      # pulling them every deploy risks throttling and offers no benefit
      # since only the-box changes between runs.
      - name: Pull latest the-box image
        run: docker compose pull the-box

      - name: Reconcile stack
        run: docker compose up -d

      - name: Show status
        run: docker compose ps

      - name: Wait for the-box to become healthy
        # `up -d` returns as soon as containers start, not when the app is
        # ready. Without this gate, a container restart-looping on a bad
        # migration or boot error would still leave the workflow green.
        # The healthcheck in compose.yml polls /health every 30s with a 30s
        # start_period; allow ~3 minutes before declaring the deploy failed.
        run: |
          set -euo pipefail
          for i in $(seq 1 36); do
            status=$(docker inspect --format='{{.State.Health.Status}}' the-box 2>/dev/null || echo "missing")
            echo "[$i/36] the-box health: $status"
            case "$status" in
              healthy)  exit 0 ;;
              unhealthy)
                echo "Container reported unhealthy — dumping recent logs:"
                docker logs --tail=200 the-box || true
                exit 1
                ;;
            esac
            sleep 5
          done
          echo "Timed out waiting for the-box to become healthy"
          docker logs --tail=200 the-box || true
          exit 1

      - name: Prune dangling images
        if: success()
        working-directory: /
        run: docker image prune -f
